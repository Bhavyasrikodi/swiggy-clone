server:
  port: 8082

spring:
  application:
    name: restaurant-service
  datasource:
    url: jdbc:postgresql://localhost:5433/restaurant_db?TimeZone=Asia/Kolkata
    username: swiggy
    password: swiggy123
    driver-class-name: org.postgresql.Driver
    hikari:
      connection-init-sql: SET TIME ZONE 'Asia/Kolkata'

  jackson:
    serialization:
      write-dates-as-timestamps: false
    time-zone: Asia/Kolkata
    deserialization:
      fail-on-unknown-properties: false
    mapper:
      require-handlers-for-java8-times: false
  jpa:
    open-in-view: false    # ← add this line
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        jdbc:
          time_zone: Asia/Kolkata

  data:
    redis:
      host: localhost
      port: 6379
      timeout: 2000ms

  kafka:
    bootstrap-servers: localhost:9092
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
  instance:
    prefer-ip-address: true

logging:
  level:
    com.swiggy: DEBUG
    org.springframework.kafka: INFO
    org.springframework.data.redis: INFO
  file:
    name: logs/restaurant-service.log
  pattern:
    console: "%d{HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n"
