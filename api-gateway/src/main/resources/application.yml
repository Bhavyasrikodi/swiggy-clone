server:
  port: 8080

spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      mvc:
        routes:
          - id: user-service-auth
            uri: lb://user-service
            predicates:
              - Path=/api/auth/**
          - id: user-service-users
            uri: lb://user-service
            predicates:
              - Path=/api/users/**
          - id: restaurant-service
            uri: lb://restaurant-service
            predicates:
              - Path=/api/restaurants/**
          - id: order-service
            uri: lb://order-service
            predicates:
              - Path=/api/orders/**
eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
  instance:
    prefer-ip-address: true

logging:
  level:
    org.springframework.cloud.gateway: DEBUG